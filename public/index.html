<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VALORANT Skins</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/app.js" defer></script>
</head>
<body>
  <div id="star-container" aria-hidden="true"></div>
  <div class="wrap">
    <h1>VALORANT Skin List</h1>
    <p>Reads your local Riot Client session, pulls your owned weapon skins, and groups them by weapon.</p>

    <div class="toolbar">
      <button id="refreshBtn" class="btn-6"><span>Refresh skins</span></button>
      <button id="downloadBtn" class="toolbar-button" type="button">Download Excel</button>
      <input id="searchInput" type="text" placeholder="Filter skins or weapons..." />
      <div class="filter-dropdown" id="filterDropdown">
        <button
          id="filterDropdownButton"
          class="filter-dropdown-button"
          type="button"
          aria-haspopup="true"
          aria-expanded="false"
        >
          <span class="filter-dropdown-label">Filters</span>
          <span class="filter-dropdown-summary" id="filterDropdownSummary">All Skins</span>
          <span class="filter-dropdown-caret" aria-hidden="true"></span>
        </button>

        <div class="filter-dropdown-menu" id="filterDropdownMenu" hidden>
          <div class="filter-option-list">
            <label class="filter-option" for="filter-all">
              <input class="filter-toggle-input" type="checkbox" id="filter-all" value="all" checked />
              <span class="filter-option-box"></span>
              <span class="filter-option-text">All Skins</span>
            </label>

            <label class="filter-option" for="filter-battlepass">
              <input class="filter-toggle-input" type="checkbox" id="filter-battlepass" value="battlepass" />
              <span class="filter-option-box"></span>
              <span class="filter-option-text">Battlepass</span>
            </label>

            <label class="filter-option" for="filter-normal">
              <input class="filter-toggle-input" type="checkbox" id="filter-normal" value="normal" />
              <span class="filter-option-box"></span>
              <span class="filter-option-text">Normal</span>
            </label>

            <label class="filter-option" for="filter-limited">
              <input class="filter-toggle-input" type="checkbox" id="filter-limited" value="limited" />
              <span class="filter-option-box"></span>
              <span class="filter-option-text">Limited</span>
            </label>

            <label class="filter-option" for="filter-contract">
              <input class="filter-toggle-input" type="checkbox" id="filter-contract" value="contract" />
              <span class="filter-option-box"></span>
              <span class="filter-option-text">Contract</span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="meta" id="meta"></div>
    <div id="message"></div>
    <div id="app"></div>
  </div>
</body>
</html>
