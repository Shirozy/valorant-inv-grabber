<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VALORANT Skin Vault</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/app.js" defer></script>
</head>
<body>
  <div id="star-container" aria-hidden="true"></div>
  <div class="wrap">
    <section class="hero">
      <p class="hero-banner" id="heroBanner">
        <span class="hero-kicker" id="heroKicker">Collection Intelligence</span>
        <span class="hero-title" id="heroTitle">VALORANT SKIN VAULT</span>
      </p>
      <p class="hero-subtitle" id="heroSubtitle">
        Inspect your owned skins, prices, chromas, and level previews in one place.
      </p>
    </section>

    <div class="toolbar">
      <button id="refreshBtn" class="btn-6"><span>Refresh skins</span></button>
      <button id="downloadBtn" class="toolbar-button" type="button">Download Excel</button>
      <input id="searchInput" type="text" placeholder="Filter skins or weapons..." />
      <div class="filter-dropdown" id="filterDropdown">
        <button
          id="filterDropdownButton"
          class="filter-dropdown-button"
          type="button"
          aria-haspopup="true"
          aria-expanded="false"
        >
          <span class="filter-dropdown-summary" id="filterDropdownSummary">Filters All Skins</span>
          <span class="filter-dropdown-caret" aria-hidden="true"></span>
        </button>

        <div class="filter-dropdown-menu" id="filterDropdownMenu" hidden>
          <div class="filter-option-list">
            <label class="filter-option" for="filter-all">
              <input class="filter-toggle-input" type="checkbox" id="filter-all" value="all" checked />
              <span class="filter-option-box"></span>
              <span class="filter-option-text">All Skins</span>
            </label>

            <label class="filter-option" for="filter-battlepass">
              <input class="filter-toggle-input" type="checkbox" id="filter-battlepass" value="battlepass" />
              <span class="filter-option-box"></span>
              <span class="filter-option-text">Battlepass</span>
            </label>

            <label class="filter-option" for="filter-normal">
              <input class="filter-toggle-input" type="checkbox" id="filter-normal" value="normal" />
              <span class="filter-option-box"></span>
              <span class="filter-option-text">Normal</span>
            </label>

            <label class="filter-option" for="filter-limited">
              <input class="filter-toggle-input" type="checkbox" id="filter-limited" value="limited" />
              <span class="filter-option-box"></span>
              <span class="filter-option-text">Limited</span>
            </label>

            <label class="filter-option" for="filter-contract">
              <input class="filter-toggle-input" type="checkbox" id="filter-contract" value="contract" />
              <span class="filter-option-box"></span>
              <span class="filter-option-text">Contract</span>
            </label>
          </div>
        </div>
      </div>
      <div class="theme-switch-wrap">
        <label class="theme-switch">
          <input id="themeToggle" type="checkbox" aria-label="Toggle theme" />
          <span class="slider"></span>
          <svg class="slider-bg" width="221" height="97" viewBox="0 0 221 97" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 13.5V28.5L8.5 68C23.6667 73.5 55.1 84.8 59.5 86C65 87.5 113.5 95.5 116 96.5C118 97.3 186.5 72.1667 220.5 59.5L209.5 17.5L165.5 10.5L121.5 6.5L105 8.5L79.5 0L0 13.5Z" fill="url(#theme-switch-bg-gradient)"/>
            <defs>
              <linearGradient id="theme-switch-bg-gradient" x1="110.25" y1="0" x2="110.25" y2="96.5187" gradientUnits="userSpaceOnUse">
                <stop id="theme-stop1" stop-color="#6A86EB"/>
                <stop id="theme-stop2" offset="0.553516" stop-color="#010203"/>
              </linearGradient>
            </defs>
          </svg>
          <svg class="slider-circle" width="42" height="42" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="21" cy="21" r="21" fill="url(#theme-switch-circle-gradient)"/>
            <defs>
              <linearGradient id="theme-switch-circle-gradient" x1="21" y1="-4.5" x2="21" y2="42" gradientUnits="userSpaceOnUse">
                <stop id="theme-stop1-circle" offset="0.261829" stop-color="#A5C5EB"/>
                <stop id="theme-stop2-circle" offset="0.699362" stop-color="#51EAFF" stop-opacity="0"/>
              </linearGradient>
            </defs>
          </svg>
          <div class="circle circle-1 size-2"></div>
          <div class="circle circle-2 size-1"></div>
          <div class="circle circle-3 size-4"></div>
          <div class="circle circle-4 size-1"></div>
          <div class="circle circle-5 size-3"></div>
          <div class="circle circle-6 size-3"></div>
          <div class="circle circle-7 size-2"></div>
          <div class="circle circle-8 size-2"></div>
          <div class="circle circle-9 size-4"></div>
          <div class="circle circle-10 size-1"></div>
          <div class="circle circle-11 size-3"></div>
          <svg class="cloud cloud-1" width="21" height="7" viewBox="0 0 21 7" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M21 6.86046H0C0.252123 4.92493 1.90727 3.43021 3.91152 3.43021C4.06622 3.43021 4.21883 3.43912 4.36888 3.45644C5.37417 1.40919 7.47974 0 9.91444 0C12.6817 0 15.0237 1.82039 15.8084 4.32896C16.2197 4.19101 16.6601 4.11626 17.1179 4.11626C18.9102 4.11626 20.4349 5.2617 21 6.86046Z" fill="url(#theme-cloud-gradient-1)"/>
            <defs>
              <linearGradient id="theme-cloud-gradient-1" x1="10.5" y1="0" x2="10.5" y2="6.86046" gradientUnits="userSpaceOnUse">
                <stop stop-color="#A8E0FF"/>
                <stop offset="1" stop-color="#7FE0FF" stop-opacity="0"/>
              </linearGradient>
            </defs>
          </svg>
          <svg class="cloud cloud-2" width="41" height="14" viewBox="0 0 41 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M41 13.3943H0C0.492246 9.61538 3.72371 6.69713 7.63678 6.69713C7.93879 6.69713 8.23674 6.71451 8.52968 6.74833C10.4924 2.7513 14.6033 0 19.3567 0C24.7594 0 29.332 3.55411 30.8639 8.45182C31.6671 8.18248 32.5269 8.03655 33.4207 8.03655C36.9199 8.03655 39.8967 10.2729 41 13.3943Z" fill="url(#theme-cloud-gradient-2)"/>
            <defs>
              <linearGradient id="theme-cloud-gradient-2" x1="20.5" y1="0" x2="20.5" y2="13.3943" gradientUnits="userSpaceOnUse">
                <stop stop-color="#94DFFF"/>
                <stop offset="1" stop-color="#7FE0FF" stop-opacity="0"/>
              </linearGradient>
            </defs>
          </svg>
          <svg class="cloud cloud-3" width="21" height="7" viewBox="0 0 21 7" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M21 6.86046H0C0.252123 4.92493 1.90727 3.43021 3.91152 3.43021C4.06622 3.43021 4.21883 3.43912 4.36888 3.45644C5.37417 1.40919 7.47974 0 9.91444 0C12.6817 0 15.0237 1.82039 15.8084 4.32896C16.2197 4.19101 16.6601 4.11626 17.1179 4.11626C18.9102 4.11626 20.4349 5.2617 21 6.86046Z" fill="url(#theme-cloud-gradient-3)"/>
            <defs>
              <linearGradient id="theme-cloud-gradient-3" x1="10.5" y1="0" x2="10.5" y2="6.86046" gradientUnits="userSpaceOnUse">
                <stop stop-color="#A8E0FF"/>
                <stop offset="1" stop-color="#7FE0FF" stop-opacity="0"/>
              </linearGradient>
            </defs>
          </svg>
          <svg class="mountain mountain-1" width="115" height="72" viewBox="0 0 115 72" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.8763 34.7586L0 68.8965L115 72L88.414 44.069H85.3226L72.3387 24.2069H66.1559L49.4624 0L30.914 34.7586H22.8763Z" fill="url(#theme-mountain-gradient-1)"/>
            <defs>
              <linearGradient id="theme-mountain-gradient-1" x1="57.5" y1="0" x2="57.5" y2="72" gradientUnits="userSpaceOnUse">
                <stop id="theme-mountain1-stop1" offset="0.290234" stop-color="#6783CA"/>
                <stop id="theme-mountain1-stop2" offset="1" stop-color="#271B59"/>
              </linearGradient>
            </defs>
          </svg>
          <svg class="mountain mountain-2" width="93" height="58" viewBox="0 0 93 58" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.5 28L0 55.5L93 58L71.5 35.5H69L58.5 19.5H53.5L40 0L25 28H18.5Z" fill="url(#theme-mountain-gradient-2)"/>
            <defs>
              <linearGradient id="theme-mountain-gradient-2" x1="46.5" y1="0" x2="46.5" y2="58" gradientUnits="userSpaceOnUse">
                <stop id="theme-mountain2-stop1" offset="0.290234" stop-color="#6783CA"/>
                <stop id="theme-mountain2-stop2" offset="1" stop-color="#271B59"/>
              </linearGradient>
            </defs>
          </svg>
          <svg class="mountain mountain-3" width="93" height="58" viewBox="0 0 93 58" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.5 28L0 55.5L93 58L71.5 35.5H69L58.5 19.5H53.5L40 0L25 28H18.5Z" fill="url(#theme-mountain-gradient-3)"/>
            <defs>
              <linearGradient id="theme-mountain-gradient-3" x1="46.5" y1="0" x2="46.5" y2="58" gradientUnits="userSpaceOnUse">
                <stop id="theme-mountain3-stop1" offset="0.290234" stop-color="#6783CA"/>
                <stop id="theme-mountain3-stop2" offset="1" stop-color="#271B59"/>
              </linearGradient>
            </defs>
          </svg>
          <svg class="mountain mountain-4" width="115" height="72" viewBox="0 0 115 72" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.8763 34.7586L0 68.8965L115 72L88.414 44.069H85.3226L72.3387 24.2069H66.1559L49.4624 0L30.914 34.7586H22.8763Z" fill="url(#theme-mountain-gradient-4)"/>
            <defs>
              <linearGradient id="theme-mountain-gradient-4" x1="57.5" y1="0" x2="57.5" y2="72" gradientUnits="userSpaceOnUse">
                <stop id="theme-mountain4-stop1" offset="0.290234" stop-color="#6783CA"/>
                <stop id="theme-mountain4-stop2" offset="1" stop-color="#271B59"/>
              </linearGradient>
            </defs>
          </svg>
        </label>
      </div>
    </div>

    <div class="meta" id="meta"></div>
    <div id="message"></div>
    <div id="app"></div>
    <section class="value-summary" id="valueSummary">
      <div class="value-summary-header">
        <div>
          <h2>Collection Value</h2>
          <p>Based on the skins currently visible with your search and filters, using 1000 VP = EUR 10.</p>
        </div>
      </div>
      <div class="value-summary-grid" id="valueSummaryGrid"></div>
    </section>
  </div>

  <div class="skin-modal" id="skinModal" hidden>
    <div class="skin-modal-backdrop" id="skinModalBackdrop"></div>
    <section
      class="skin-modal-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="skinModalTitle"
    >
      <button class="skin-modal-close" id="skinModalClose" type="button" aria-label="Close skin details">
        ×
      </button>
      <div class="skin-modal-body" id="skinModalBody"></div>
    </section>
  </div>
</body>
</html>
